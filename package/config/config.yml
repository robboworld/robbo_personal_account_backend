server:
  address: "0.0.0.0:8080"

graphqlServer:
  port: "8080"

auth:
  # legacy_jwt | oidc_bff | lms_db
  mode: "oidc_bff"
  # When true with oidc_bff: email+password fallback via LMS MySQL (openedx.auth_user)
  lmsPasswordFallback: true
  # Override via env: AUTH_HASH_SALT, AUTH_ACCESS_SIGNING_KEY, AUTH_REFRESH_SIGNING_KEY, AUTH_MODE
  hash_salt: ""
  access_signing_key: ""
  refresh_signing_key: ""
  access_token_ttl: 300 # 5 min 60*5
  refresh_token_ttl: 604800 # 7 day
  refresh_cookie_secure: false

legacyPostgres:
  # When false, LK uses Projects DB + OIDC only (no robbo_db).
  enabled: false

oidc:
  enabled: true
  issuer: "http://localhost:8081/default"
  authorizationEndpoint: "http://localhost:8081/default/authorize"
  tokenEndpoint: "http://localhost:8081/default/token"
  jwksUri: "http://localhost:8081/default/jwks"
  clientId: "lk-web"
  redirectUri: "http://localhost:8080/auth/oidc/callback"
  scopes: "openid profile email"
  frontendBaseUrl: "http://localhost:3030"
  logoutEndpoint: ""
  postLogoutRedirectUri: "http://localhost:3030/login"

lmsMysql:
  # Or env LMS_MYSQL_DSN — read-only user for workers/scripts
  dsn: "lk_readonly:lk_readonly_change_me@tcp(localhost:3307)/openedx"

lmsNotifications:
  enabled: false
  ingestBearerToken: ""

portalOutbox:
  enabled: true

projectPage:
  scratchLink: "0.0.0.0:8601/"

postgres:
  postgresDsn: "host=localhost port=5432 user=robbo password=robbo_pwd dbname=robbo_db sslmode=disable"

projectsPostgres:
  postgresDsn: "host=localhost port=5433 user=robbo_projects password=robbo_projects_change_me dbname=robbo_projects sslmode=disable"

api_urls:
  refreshToken: "https://edx-test.ru/oauth2/access_token"
  getUser: "https://edx-test.ru/api/user/v1/me"
  getCourse: "https://edx-test.ru/api/courses/v1/courses/"
  getEnrollment: "https://edx-test.ru/api/enrollment/v1/enrollments?username="
  getCourses: "https://edx-test.ru/api/courses/v1/courses/"
  getAllPublicCourses: "https://courses.edx.org/api/courses/v1/courses/?page="
  postEnrollment: "https://edx-test.ru/api/enrollment/v1/enrollment"
  postRegistration: "https://edx-test.ru/api/user/v1/account/registration/"
  postCohort: "https://edx-test.ru/api/cohorts/v1/courses/"
  login: "https://edx-test.ru/api/user/v1/account/login_session/"
  getLogin: "https://edx-test.ru/login"
  getRegistration: "https://edx-test.ru/register?next=%2F"

api:
  # Override via env: API_TOKEN, API_CLIENT_ID, API_CLIENT_SECRET
  token: ""
  token_expiration_time: 0
  client_id: ""
  client_secret: ""
