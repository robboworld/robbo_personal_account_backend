# Явное имя проекта: иначе при сборке из этой папки Docker берёт имя каталога
# (robbo_personal_account_backend) и тег образа app становится другим, чем у уже
# запущенного стека с docker compose -p rpa2 (образ rpa2-app) — новый код не попадает в контейнер.
name: rpa2

services:
  app:
    restart: unless-stopped
    build:
      context: .
      network: host
    environment:
      - DEBUG=false
      - LEGACY_POSTGRES_ENABLED=false
      - AUTH_MODE=oidc_bff
      - AUTH_LMS_PASSWORD_FALLBACK=true
      - LK_SSO_WITH_LMS_ENABLED=true
      - PROJECTS_POSTGRES_DSN=host=host.docker.internal port=5433 user=robbo_projects password=robbo_projects_change_me dbname=robbo_projects sslmode=disable
      - LMS_MYSQL_DSN=lk_readonly:lk_readonly_change_me@tcp(host.docker.internal:3307)/openedx
      - LMS_MYSQL_WRITE_DSN=root:lms_root_change_me@tcp(host.docker.internal:3307)/openedx
      - OIDC_ISSUER=http://host.docker.internal:8081/default
      - OIDC_AUTHORIZATION_ENDPOINT=http://host.docker.internal:8081/default/authorize
      - OIDC_TOKEN_ENDPOINT=http://host.docker.internal:8081/default/token
      - OIDC_JWKS_URI=http://host.docker.internal:8081/default/jwks
      - OIDC_CLIENT_ID=lk-web
      - OIDC_REDIRECT_URI=http://localhost:8080/auth/oidc/callback
      - OIDC_FRONTEND_BASE_URL=http://localhost:3030
      - AUTH_HASH_SALT=hash_salt
      - AUTH_ACCESS_SIGNING_KEY=access_signing_key
      - AUTH_REFRESH_SIGNING_KEY=refresh_signing_key
      - AUTH_REFRESH_COOKIE_SECURE=false
      - CORS_ALLOW_PRIVATE_NETWORK=true
      - PORTAL_OUTBOX_ENABLED=false
      - API_TOKEN=GiafmKI2tyt9pyXDpEVYto0Ar2qmOS
      - API_CLIENT_ID=uYSlyzAlmR2dEuukRWkqjcYjK6BplIYyXo8SawJl
      - API_CLIENT_SECRET=vWXLUQf9KsOFtl5RhxkNozjIVV3gWZDcUERpLXd8ypAtrHmiCo1tLG0N9TV4ryIgnOcZZt3Cnc4oUXLUpfacXB3ocSBJCIJAK5cax6xm9ElhBjHlc6dKPE8rd72lZWQM
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 8080:8080
    networks:
      - lk

networks:
  lk:
    driver: bridge
