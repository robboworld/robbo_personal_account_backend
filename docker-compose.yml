# Явное имя проекта: иначе при сборке из этой папки Docker берёт имя каталога
# (robbo_personal_account_backend) и тег образа app становится другим, чем у уже
# запущенного стека с docker compose -p rpa2 (образ rpa2-app) — новый код не попадает в контейнер.
name: rpa2

services:
  postgres:
    restart: always
    image: postgres:13
    ports:
      - 5432:5432
    environment:
      - DEBUG=false
      - POSTGRES_USER=robbo
      - POSTGRES_PASSWORD=robbo_pwd
      - POSTGRES_DB=robbo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robbo -d robbo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  app:
    build:
      context: .
      network: host
    # PROJECT DB запуск отдельно: robbo_projects_db (host :5433). Для приложения в Docker указывать
    # REACHABLE хост: host.docker.internal + extra_hosts (или общая docker network со стеком projects).
    environment:
      - DEBUG=false
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=robbo
      - POSTGRES_PASSWORD=robbo_pwd
      - POSTGRES_DB=robbo_db
      - AUTH_HASH_SALT=hash_salt
      - AUTH_ACCESS_SIGNING_KEY=access_signing_key
      - AUTH_REFRESH_SIGNING_KEY=refresh_signing_key
      - AUTH_REFRESH_COOKIE_SECURE=false
      - API_TOKEN=GiafmKI2tyt9pyXDpEVYto0Ar2qmOS
      - API_CLIENT_ID=uYSlyzAlmR2dEuukRWkqjcYjK6BplIYyXo8SawJl
      - API_CLIENT_SECRET=vWXLUQf9KsOFtl5RhxkNozjIVV3gWZDcUERpLXd8ypAtrHmiCo1tLG0N9TV4ryIgnOcZZt3Cnc4oUXLUpfacXB3ocSBJCIJAK5cax6xm9ElhBjHlc6dKPE8rd72lZWQM
      - PROJECTS_POSTGRES_DSN=host=host.docker.internal port=5433 user=robbo_projects password=robbo_projects_change_me dbname=robbo_projects sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 8080:8080
    networks:
      - postgres
volumes:
  postgres_data:
    name: robbo_personal_account_backend_postgres_data
networks:
  postgres:
    driver: bridge
